<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音商家评价 - 麦当劳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 20px auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .header {
            background: linear-gradient(135deg, #fe2c55 0%, #ff0050 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        
        .content {
            padding: 25px;
        }
        
        .store-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .store-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .store-logo {
            width: 60px;
            height: 60px;
            background: #FFC72C;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .store-info {
            flex: 1;
        }
        
        .store-name {
            font-size: 17px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .store-meta {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
        }
        
        .tag {
            display: inline-block;
            background: #fff3e0;
            color: #ff6b00;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
            margin-top: 5px;
        }
        
        .review-section {
            background: white;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .review-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .review-icon {
            font-size: 20px;
            margin-right: 8px;
        }
        
        .review-title {
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }
        
        .review-text {
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #fe2c55;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #fe2c55 0%, #ff0050 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(254, 44, 85, 0.3);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background: white;
            color: #fe2c55;
            border: 2px solid #fe2c55;
        }
        
        .btn-secondary:active {
            background: #fff5f7;
        }
        
        .tips-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .tips-title {
            font-size: 14px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .tips-content {
            font-size: 13px;
            color: #558b2f;
            line-height: 1.6;
        }
        
        .tips-content li {
            margin-bottom: 5px;
            list-style-position: inside;
        }
        
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 15px;
            z-index: 1000;
            display: none;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .toast-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .link-box {
            background: #fff3e0;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 12px;
            color: #e65100;
            word-break: break-all;
            text-align: center;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }
        
        .toast.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🎬</div>
            <div class="header-title">抖音商家评价任务</div>
        </div>
        
        <div class="content">
            <!-- 商家信息卡片 -->
            <div class="store-card">
                <div class="store-header">
                    <div class="store-logo">🍔</div>
                    <div class="store-info">
                        <div class="store-name">麦当劳(北清路二号得来速餐厅店)</div>
                        <div class="store-meta">
                            🍴 西式快餐 · 人均 ¥33<br>
                            📍 北京市
                        </div>
                    </div>
                </div>
                <div>
                    <span class="tag">🔥 热销榜</span>
                    <span class="tag">⭐ 高评分</span>
                </div>
            </div>
            
            <!-- 评价内容 -->
            <div class="review-section">
                <div class="review-header">
                    <span class="review-icon">📝</span>
                    <span class="review-title">评价文案（点击按钮自动复制）</span>
                </div>
                <div class="review-text" id="reviewText">
麦当劳的汉堡依然是那个熟悉的味道！薯条炸得金黄酥脆，配上番茄酱特别满足。得来速服务很快，不用下车就能取餐，超级方便。环境干净整洁，服务态度也很好，适合快节奏生活的选择！👍
                </div>
            </div>
            
            <!-- 按钮组 -->
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="copyReview()">
                    <span>📋</span>
                    <span>仅复制</span>
                </button>
                <button class="btn btn-primary" onclick="copyAndJump()">
                    <span>🚀</span>
                    <span>复制并跳转抖音</span>
                </button>
            </div>
            
            <!-- 抖音链接 -->
            <div class="link-box">
                🔗 抖音链接：https://v.douyin.com/5S7Vseq2UW4/
            </div>
            
            <!-- 操作提示 -->
            <div class="tips-box">
                <div class="tips-title">
                    <span>💡</span>
                    <span>操作步骤</span>
                </div>
                <ul class="tips-content">
                    <li>点击"复制并跳转抖音"按钮</li>
                    <li>自动跳转到麦当劳商家页面</li>
                    <li>点击"写评价"按钮</li>
                    <li>长按粘贴复制的文案</li>
                    <li>选择星级并发布评价</li>
                </ul>
            </div>
        </div>
    </div>
    
    <!-- 提示弹窗 -->
    <div class="toast" id="toast">
        <div class="toast-icon">✓</div>
        <div id="toastText">复制成功</div>
    </div>

    <script>
        // 商家配置
        const storeConfig = {
            name: '麦当劳(北清路二号得来速餐厅店)',
            douyinLink: 'https://v.douyin.com/5S7Vseq2UW4/',
            reviewText: document.getElementById('reviewText').innerText.trim()
        };
        
        // 仅复制评价
        function copyReview() {
            copyToClipboard(storeConfig.reviewText)
                .then(() => {
                    showToast('✓ 复制成功！', 2000);
                })
                .catch(() => {
                    showToast('❌ 复制失败，请手动复制', 2000);
                });
        }
        
        // 复制并跳转
        function copyAndJump() {
            copyToClipboard(storeConfig.reviewText)
                .then(() => {
                    showToast('✓ 已复制<br>正在跳转抖音...', 1500);
                    
                    // 延迟后跳转
                    setTimeout(() => {
                        openDouyin();
                    }, 1500);
                })
                .catch(() => {
                    showToast('❌ 复制失败', 2000);
                });
        }
        
        // 复制到剪贴板
        function copyToClipboard(text) {
            // 优先使用现代API
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(text);
            } else {
                // 降级方案
                return new Promise((resolve, reject) => {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-999999px';
                    textarea.style.top = '-999999px';
                    document.body.appendChild(textarea);
                    textarea.focus();
                    textarea.select();
                    
                    try {
                        const successful = document.execCommand('copy');
                        document.body.removeChild(textarea);
                        if (successful) {
                            resolve();
                        } else {
                            reject(new Error('Copy failed'));
                        }
                    } catch (err) {
                        document.body.removeChild(textarea);
                        reject(err);
                    }
                });
            }
        }
        
        // 打开抖音
        function openDouyin() {
            const douyinLink = storeConfig.douyinLink;
            const userAgent = navigator.userAgent.toLowerCase();
            const isWeChat = /micromessenger/.test(userAgent);
            
            // 如果在微信中，提示用户在浏览器中打开
            if (isWeChat) {
                alert('请点击右上角 ⋯ 选择"在浏览器中打开"以跳转到抖音App');
                return;
            }
            
            // 检测设备
            const isIOS = /iphone|ipad|ipod/.test(userAgent);
            const isAndroid = /android/.test(userAgent);
            
            // 尝试打开抖音短链接（会自动唤起App）
            window.location.href = douyinLink;
            
            // 备用方案：如果2秒后还在页面，说明可能没有安装抖音
            setTimeout(() => {
                const confirmDownload = confirm('未检测到抖音App，是否前往下载？');
                if (confirmDownload) {
                    if (isIOS) {
                        window.location.href = 'https://apps.apple.com/cn/app/id1142110895';
                    } else if (isAndroid) {
                        window.location.href = 'https://www.douyin.com/';
                    } else {
                        window.location.href = 'https://www.douyin.com/';
                    }
                }
            }, 2500);
        }
        
        // 显示提示
        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toastText');
            toastText.innerHTML = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }
        
        // 阻止页面在微信中被分享
        document.addEventListener('WeixinJSBridgeReady', function() {
            WeixinJSBridge.call('hideOptionMenu');
        });
    </script>
</body>
</html>
