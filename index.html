<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复制并跳转抖音</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .text-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #fe2c55;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .success-msg {
            display: none;
            text-align: center;
            color: #52c41a;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom: 20px; color: #333;">📝 任务文案</h2>
        
        <div class="text-box" id="textContent">
            四点水羊汤清甜爽口，辣子鸡香辣开胃，环境和服务也不错，整体用餐体验十分愉快！
        </div>
        
        <button class="btn" onclick="copyAndOpenDouyin()">
            复制并去抖音点评
        </button>
        
        <div class="success-msg" id="successMsg">
            ✓ 已复制，正在打开抖音...
        </div>
    </div>

    <script>
        function copyAndOpenDouyin() {
            const text = document.getElementById('textContent').innerText;
            const successMsg = document.getElementById('successMsg');
            
            // 复制文案
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showSuccess();
                    openDouyinApp();
                });
            } else {
                // 兼容旧版浏览器
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    showSuccess();
                    openDouyinApp();
                } catch (err) {
                    alert('复制失败，请手动复制');
                }
                
                document.body.removeChild(textarea);
            }
            
            function showSuccess() {
                successMsg.style.display = 'block';
            }
            
            function openDouyinApp() {
                setTimeout(() => {
                    // 抖音 URL Scheme
                    const douyinScheme = 'snssdk1128://';
                    
                    // 创建隐藏iframe尝试打开
                    const iframe = document.createElement('iframe');
                    iframe.style.display = 'none';
                    iframe.src = douyinScheme;
                    document.body.appendChild(iframe);
                    
                    // 备用方案：直接跳转
                    setTimeout(() => {
                        window.location.href = douyinScheme;
                    }, 500);
                    
                    // 如果2秒后还在页面，说明没有安装抖音
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        // 可以引导用户下载抖音
                        if (confirm('未检测到抖音App，是否前往下载？')) {
                            window.location.href = 'https://www.douyin.com/';
                        }
                    }, 2000);
                }, 500);
            }
        }
    </script>
</body>
</html>
