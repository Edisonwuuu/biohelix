<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>抖音商家直跳</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:12px}
input,button{width:100%;padding:12px;margin:10px 0;font-size:16px}
button{background:#fe2c55;color:#fff;border:none;border-radius:6px}
</style>
</head>
<body>

<div class="box">
<h2>抖音商家评价直跳</h2>

<textarea id="review" rows="4">这家店环境不错，服务也很好，推荐！</textarea>

<input id="poiInput" placeholder="粘贴POI ID或抖音商家链接">

<button onclick="parsePOI()">解析 POI</button>
<button id="openBtn" onclick="copyAndOpen()" disabled>复制并打开抖音商家页</button>
</div>

<script>
let poiId = null;

function parsePOI(){
    const text = document.getElementById('poiInput').value;
    const match = text.match(/poi_id=(\d{15,20})|\/poi\/(\d{15,20})|^(\d{15,20})$/);
    if(match){
        poiId = match[1] || match[2] || match[3];
        document.getElementById('openBtn').disabled = false;
        alert("识别成功 POI ID: " + poiId);
    }else{
        alert("未识别到 POI ID");
    }
}

function copyAndOpen(){
    const review = document.getElementById('review').value;
    navigator.clipboard.writeText(review).then(()=>{
        openDouyin();
    });
}

function openDouyin(){
    if(/micromessenger/i.test(navigator.userAgent)){
        alert("请点击右上角 ··· 选择 在浏览器中打开");
        return;
    }
    const url = `https://www.douyin.com/link/?target=poi&poi_id=${poiId}`;
    window.location.href = url;
}
</script>

</body>
</html>
