<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <base href="/biohelix/">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dmol</title>
    <link rel="stylesheet" type="text/css" href="/css/toastify.min.css">
    <script type="text/javascript" src="/js/toastify.js"></script>
    <script src="/apps/mole-3d/js/3Dmol-min.js"></script>
    <!-- <script src="./js/message.js"></script> -->
    <script>
        const unit = window.parent.unit3d;
    </script>
    <link rel="stylesheet" href="/apps/mole-3d/css/style.css">
</head>

<body>
    <div id="wrapper">
        <div id="asideList">
        </div>
        <div id="exportOptions">
            <select id="styleSelect">
                <option value="stick+sphere">球棍模型</option>
                <option value="sphere">空间填充模型</option>
                <option value="line">线框模型</option>
                <option value="stick">棒模型</option>
                <option value="surface">表面模型</option>
            </select>
            <select id="formatSelect">
                <option value="pdb">PDB</option>
                <option value="mol2">MOL2</option>
                <option value="sdf">SDF</option>
                <option value="xyz">XYZ</option>
            </select>
            <button id="exportButton">
                <span class="icon export-icon"></span>
                <span class="button-text">Export</span>
            </button>
            <select id="convertSelect">
                <option value="uff">UFF算法</option>
                <option value="mmff">MMFF算法</option>
            </select>
            <!-- <button id="processButton">
                <span class="icon process-icon"></span>
                <span class="button-text">Force Field</span>
            </button> -->
        </div>
        <div id="container"></div>
    </div>
</body>
<script src="/apps/mole-3d/js/SHA256.js"></script>
<script src="/apps/mole-3d/js/MolPoolManager.js"></script>
<script src="/apps/mole-3d/js/index.js"></script>
<script>
    const processButton = document.getElementById('processButton');
    const asideList = document.getElementById('asideList');
    const container = document.getElementById('container');
    const convertSelect = document.querySelector('#convertSelect');
    let convertOption = 'uff';

    document.addEventListener('DOMContentLoaded', function () {
        // 注册通信单元
        unit.registerApp('3d')
        // 添加响应式样式控制
        function updateStyles() {
            const parentWidth = window.parent ? window.parent.innerWidth : window.innerWidth;
            const body = document.body;

            if (parentWidth <= 992) {
                body.classList.add('small-screen');
            } else {
                body.classList.remove('small-screen');
            }
        }

        // 页面加载时执行一次
        updateStyles();

        // 监听父窗口的 resize 事件
        if (window.parent) {
            window.parent.addEventListener('resize', updateStyles);
        } else {
            window.addEventListener('resize', updateStyles);
        }

        let viewer = $3Dmol.createViewer(container, {
            backgroundColor: 'white',
            id: 'viewer',
            width: 'auto',     // 使用 auto 而不是固定值
            height: 'auto'
        });

        let modelLoaded = false;
        let atoms = [];
        let allData = [];

        let isAI = false;
        let isAIGenerated = false; // 标记AI生成是否完成
        let aiGenerationCompleteTimeout = null; // AI完成后的延迟定时器
        let pollingInterval = null; // 定时轮询的间隔
        const POLLING_DELAY = 500; // 每次轮询的间隔（毫秒）
        const MAX_WAIT_TIME = 15000; // 最大等待时间（毫秒），避免无限等待
        let previousAllDataLength = 0; // 上一次记录的 allData 长度
        let waitTime = 0; // 已等待的时间

        unit.on('startAI', () => {
            isAI = true;
        })

        // AI生成完成事件
        unit.on('endAI', () => {
            isAIGenerated = true; // 标记AI生成完成
            // 如果已有检测在进行，清除之前的定时器
            if (pollingInterval) clearInterval(pollingInterval);
            // 开始动态检测
            previousAllDataLength = allData.length;
            waitTime = 0; // 重置等待时间
            pollingInterval = setInterval(() => {
                waitTime += POLLING_DELAY;

                // 检测 allData 是否停止变化
                if (allData.length === previousAllDataLength) {
                    isAI = false;
                    // 确保数据完整后执行相关操作
                    // unit.sendMessage('getSDF', allData, 'main-app');
                    clearInterval(pollingInterval); // 停止轮询
                    pollingInterval = null; // 重置轮询状态
                    isAIGenerated = false; // 重置标志位
                } else {
                    // 如果有变化，更新上一次的长度
                    previousAllDataLength = allData.length;
                }

                // 如果超出最大等待时间，强制结束
                if (waitTime >= MAX_WAIT_TIME) {
                    // 即使超时，也执行相关操作
                    // unit.sendMessage('getSDF', allData, 'main-app');
                    clearInterval(pollingInterval); // 停止轮询
                    pollingInterval = null; // 重置轮询状态
                    isAIGenerated = false; // 重置标志位
                }
            }, POLLING_DELAY); // 每隔 POLLING_DELAY 毫秒检测一次
        });

        // 添加一个变量来存储上次的数据，便于比较
        let previousData = null;

        // 分子结构资源池
        const poolManager = new MolPoolManager(SHA256);

        // 添加一个函数来处理侧边栏的显示/隐藏
        const updateAsideListVisibility = () => {
            if (allData && allData.length > 1) {
                asideList.style.display = 'block';
                container.classList.remove('full-width');

                // 创建列表元素
                const ul = document.createElement('ul');
                ul.className = 'aside-menu';

                // 创建 "所有分子式" 列表项
                const allItem = document.createElement('li');
                allItem.textContent = '所有分子式';
                allItem.className = 'menu-item active';
                allItem.addEventListener('click', () => handleItemClick(event, []));
                ul.appendChild(allItem);

                // 生成列表项
                allData.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.textContent = "分子式-" + (index + 1);
                    li.className = 'menu-item';
                    li.addEventListener('click', (event) => handleItemClick(event, [item]));
                    ul.appendChild(li);
                });

                // 将列表添加到容器中
                asideList.innerHTML = '';
                asideList.appendChild(ul);
            } else {
                asideList.innerHTML = '';
                asideList.style.display = 'none';
                container.classList.add('full-width');
            }
        };

        /**
         * 接收消息后的回调函数
         */
        const handleIncomingMessage = (data) => {
            const { msgDetailType, data: newData } = data
            // 确保 newData 
            const dataArray = Array.isArray(newData) ? newData : [newData];
            // 找出需要增加和删除的数据
            const addedData = [];
            const removedData = [];
            if (previousData) {
                // 转换为Set便于比较
                const prevSet = new Set(previousData);
                const newSet = new Set(dataArray);

                // 找出新增的数据
                dataArray.forEach(item => {
                    if (!prevSet.has(item)) {
                        addedData.push(item);
                    }
                });

                // 找出删除的数据
                previousData.forEach(item => {
                    if (!newSet.has(item)) {
                        removedData.push(item);
                    }
                });
            } else {
                // 如果是首次接收数据，全部视为新增
                addedData.push(...dataArray);
            }
            // 只处理有变化的数据
            if (addedData.length > 0) {
                const processedStrings = poolManager.processStrings(addedData);
                const addedIds = poolManager.addToPool(processedStrings);
            }

            if (removedData.length > 0) {
                poolManager.removeFromPool(removedData);
            }

            allData = poolManager.getAllData();
            if (!isAI) {
                unit.sendMessage('getSDF', allData, 'main-app');
            }
            // renderMolecule(allData);
            // get3D()
            modelLoaded = true;

            // 更新previousData，存储当前数据用于下次比较
            previousData = [...dataArray];

            // 更新侧边栏显示
            updateAsideListVisibility();
        }

        // 初始化时调用一次来确保正确的初始状态
        updateAsideListVisibility();

        unit.on('sdfChanged', handleIncomingMessage);
        unit.on('render-3d', () => {
            get3D()
        });

        // 创建一个函数来确保 canvas 尺寸正确
        function ensureCanvasSize() {
            const canvas = viewer.getCanvas();
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            // canvas.style.top='-15%';
            viewer.resize();
        }

        // 渲染分子式
        function renderMolecule(list, changeFlag = false) {
            viewer.clear(); // 清空之前的模型

            const molecules = list.map((sdf, index) => {
                const molecule = viewer.addModel(sdf.originalString, "sdf");
                // 如果进行过立场计算添加分子并应用力场计算
                if (sdf.isChange) {
                    // 恢复原始相对位置
                    const offset = {
                        x: index * (sdf.originalPosition.size.x + 4),
                        y: 0,
                        z: 0
                    };
                    restoreMoleculePosition(molecule, sdf.originalPosition, offset);
                    return molecule;
                } else {
                    atoms = molecule.selectedAtoms({});
                    return molecule;
                }
            }).filter(Boolean); // 过滤掉可能的 undefined 值

            // 获取当前选择的样式
            const selectedStyle = document.getElementById('styleSelect').value;

            // 根据选择的样式设置分子显示模式
            molecules.forEach((mol, index) => {
                let styleConfig = {};
                switch (selectedStyle) {
                    case 'sphere':
                        styleConfig = {
                            sphere: { radius: 0.8 }
                        };
                        break;
                    case 'line':
                        viewer.setStyle({
                            model: index
                        }, {
                            line: {
                                linewidth: 5,
                                colorscheme: 'purpleCarbon'
                            }
                        });

                        viewer.addSurface("VDW", {
                            opacity: 0.7,
                            color: 'white'
                        })
                        return;
                    case 'stick':
                        styleConfig = {
                            stick: {},
                            sphere: {
                                radius: 0.2
                            }
                        };
                        break;
                    case 'surface':
                        // 设置基础样式
                        viewer.setStyle({
                            model: index
                        }, {
                            line: {
                                linewidth: 1,
                                color: "darkviolet"
                            },
                            stick: {
                                singleBonds: true,
                                colorscheme: "element",
                                radius: 0.5,
                                opacity: 1
                            }
                        });

                        // 添加表面
                        viewer.addSurface("VDW", {
                            opacity: 0.7,
                            color: 'white'
                        }, {
                            model: index
                        });

                        // 跳过默认的 setStyle 调用
                        return;
                    case 'stick':
                    default:
                        styleConfig = {
                            stick: {
                                singleBonds: true,
                                color: "gray",
                                radius: 0.12,
                                opacity: 1
                            },
                            sphere: {
                                singleBonds: true,
                                colorscheme: "element",
                                radius: 0.4,
                                scale: 0.8,
                                opacity: 1
                            }
                        };
                        break;
                }

                // 对于非 surface 样式，使用常规的 setStyle
                if (selectedStyle !== 'surface' || selectedStyle !== 'line') {
                    viewer.setStyle({
                        model: index
                    }, styleConfig);
                }
            });

            viewer.zoomTo();
            viewer.render();

            // 在渲染后确保 canvas 尺寸正确
            ensureCanvasSize();

            // 添加一个小延时，确保在分子完全加载后再次调整尺寸
            setTimeout(ensureCanvasSize, 100);
        }

        // 监听窗口大小变化
        window.addEventListener('resize', ensureCanvasSize);

        // 处理列表项点击事件
        function handleItemClick(e, molobjs = []) {
            // 移除所有项的高亮
            const allItems = document.querySelectorAll('.menu-item');
            allItems.forEach(item => {
                item.classList.remove('active');
            });
            // 给当前点击项添加高亮
            e.target.classList.add('active');

            // 如果是点击"所有分子式"
            if (molobjs.length === 0) {
                // 直接使用 poolManager 中的数据，不更新 allData
                renderMolecule(poolManager.getAllData());
            } else {
                // 如果是点击单个分子，只渲染该分子
                renderMolecule(molobjs);
            }
        }

        // 立场转换按钮点击事件
        const get3D = () => {
            if (allData.length === 0) {
                Toastify(
                    {
                        text: '请先上您的文件，以便我们更好地为您服务！',
                        style: {
                            background: '#02ABB9'
                        }
                    }
                ).showToast();
                return;
            }
            // 检查是否所有数据都已转换
            const allConverted = allData.every(item => item.isChange);
            if (allConverted) {
                Toastify(
                    {
                        text: '您已经进行过立场转换，请勿重复操作！',
                        style: {
                            background: '#02ABB9'
                        }
                    }
                ).showToast();
                return;
            }
            unit.sendMessage("needLoading", "", "main-app");
            sendRequest(allData)
        };

        convertSelect.addEventListener('change', function () {
            convertOption = this.value;
            allData.forEach(item => {
                item.isChange = false;
            });
            get3D();
        })

        async function uffConvert(originalArray) {
            let finalResult = [];
            for (let i = 0; i < originalArray?.length; i++) {
                const sdfData = originalArray[i];

                // 创建 FormData 对象
                const formData = new FormData();
                const blob = new Blob([sdfData], { type: "chemical/x-mdl-sdfile" });
                const sdfFile = new File([blob], `molecule_${i}.sdf`, { type: "chemical/x-mdl-sdfile" });
                formData.append("sdf_file", sdfFile); // 单文件上传，键名固定为 sdf_file

                // 使用 fetch 发送 POST 请求
                const response = await fetch('https://moleditor.com:3003/api/molecule/uff', {
                    method: "POST",
                    body: formData,
                });

                if (response.ok) {
                    const result = await response.json();
                    finalResult.push(result.data.sdf_data)
                } else {
                    console.error(`文件 molecule_${i + 1}.sdf 上传失败:`, response.status, response.statusText);
                }
            }
            if (finalResult) {
                return { result: finalResult, message: 'uff力场计算成功' };
            }
        }

        async function mmffConvert(originalArray) {
            let finalResult = [];
            for (let i = 0; i < originalArray?.length; i++) {
                const sdfData = originalArray[i];
                // 创建 FormData 对象
                const formData = new FormData();
                const blob = new Blob([sdfData], { type: "chemical/x-mdl-sdfile" });
                const sdfFile = new File([blob], `molecule_${i}.sdf`, { type: "chemical/x-mdl-sdfile" });
                formData.append("sdf_file", sdfFile); // 单文件上传，键名固定为 sdf_file

                // 使用 fetch 发送 POST 请求
                const response = await fetch('https://moleditor.com:3003/api/molecule/mmff_field', {
                    method: "POST",
                    body: formData,
                });

                if (response.ok) {
                    const result = await response.json();
                    finalResult.push(result.data.sdf_data)
                } else {
                    console.error(`文件 molecule_${i + 1}.sdf 上传失败:`, response.status, response.statusText);
                }
            }

            if (finalResult) {
                return { result: finalResult, message: 'mmff力场计算成功' };
            }
        }

        async function sendRequest(data) {
            try {
                const idArray = [];
                const originalArray = [];
                let convertResult = [];

                data.filter(item => !item.isChange).forEach(item => {
                    if (item.id) {
                        idArray.push(item.id);
                    }
                    if (item.originalString) {
                        originalArray.push(item.originalString);
                    }
                });

                // 如果没有需要转换的分子，直接返回
                if (originalArray.length === 0) {
                    Toastify(
                        {
                            text: '没有需要转换的分子',
                            style: {
                                background: '#02ABB9'
                            }
                        }
                    ).showToast();
                    return;
                }

                switch (convertOption) {
                    case 'uff':
                        convertResult = await uffConvert(originalArray);
                        break;
                    case 'mmff':
                        convertResult = await mmffConvert(originalArray);
                        break;
                }

                if (convertResult.result) {
                    Toastify(
                        {
                            text: convertResult.message,
                            gravity: "top",
                            position: "center",
                            style: {
                                background: '#02ABB9'
                            }
                        }
                    ).showToast();
                    const updateMols = poolManager.updateInPool(idArray, convertResult.result);
                }

                // 修改这里：对于单个分子的情况特殊处理
                if (allData.length === 1) {
                    // 直接渲染更新后的分子
                    renderMolecule(poolManager.getAllData(), true);
                } else {
                    // 多个分子时的逻辑保持不变
                    const activeItem = document.querySelector('.menu-item.active');
                    if (activeItem) {
                        if (activeItem.textContent === '所有分子式') {
                            renderMolecule(poolManager.getAllData(), true);
                        } else {
                            const index = parseInt(activeItem.textContent.split('-')[1]) - 1;
                            const singleMol = poolManager.getAllData()[index];
                            renderMolecule([singleMol], true);
                        }
                    }
                }

                // 更新全局数据
                allData = poolManager.getAllData();

            } catch (error) {
                Toastify(
                    {
                        text: '请求失败，请稍后再试！',
                        style: {
                            background: '#02ABB9'
                        }
                    }
                ).showToast();
            } finally {
                unit.sendMessage("hideLoading", "", "main-app")
            }
        }

        // 导出功能
        document.getElementById("exportButton").addEventListener("click", function () {
            if (!modelLoaded) {
                alert("No molecule loaded!");
                return;
            }

            let format = document.getElementById("formatSelect").value;
            let content = "";
            switch (format) {
                case "pdb":
                    try {
                        // 获取所有原子信息
                        const models = viewer.getModel();
                        if (models) {
                            const atoms = models.selectedAtoms({});
                            content = "HEADER    Generated by 3D Molecule Viewer\n";
                            atoms.forEach((atom, i) => {
                                // PDB格式的ATOM记录
                                content += sprintf("ATOM  %5d  %-3s %3s %1s%4d    %8.3f%8.3f%8.3f  1.00  0.00\n",
                                    i + 1,                    // 原子序号
                                    atom.elem,                // 元素符号
                                    "UNK",                    // 残基名称
                                    "A",                      // 链标识符
                                    1,                        // 残基序号
                                    atom.x,                   // X坐标
                                    atom.y,                   // Y坐标
                                    atom.z                    // Z坐标
                                );
                            });
                            content += "END\n";
                        }
                    } catch (error) {
                        alert("PDB格式转换失败!");
                        return;
                    }
                    break;
                case "sdf":
                    // SDF格式导出
                    if (allData && allData.length > 0) {
                        content = allData
                            .filter(mol => mol && mol.originalString)
                            .map(mol => mol.originalString)
                            .join('\n$$$$\n');
                        if (content) {
                            content += '\n$$$$\n'; // 添加最后的分隔符
                        }
                    }
                    break;
                case "xyz":
                    // XYZ格式导出
                    const models = viewer.getModel();
                    if (models) {
                        const xyzAtoms = models.selectedAtoms({});
                        if (!xyzAtoms || xyzAtoms.length === 0) {
                            throw new Error("没有找到原子数据");
                        }

                        // 第一行：原子数量
                        content = `${xyzAtoms.length}\n`;
                        // 第二行：注释
                        content += `Generated by 3D Molecule Viewer\n`;
                        // 后续行：原子数据
                        xyzAtoms.forEach(atom => {
                            if (!atom.elem || atom.x === undefined ||
                                atom.y === undefined || atom.z === undefined) {
                                throw new Error("原子数据不完整");
                            }
                            // 确保数字格式化为固定小数位数
                            const x = parseFloat(atom.x).toFixed(6);
                            const y = parseFloat(atom.y).toFixed(6);
                            const z = parseFloat(atom.z).toFixed(6);
                            // XYZ格式：素符号 后跟三个空格分隔的坐标
                            content += `${atom.elem}      ${x}    ${y}    ${z}\n`;
                        });
                    }
                    break;
                case "mol2":
                    try {
                        const models = viewer.getModel();
                        if (!models) {
                            throw new Error("无法获取分子模型");
                        }

                        // 获取原子及其坐标
                        const atoms = models.selectedAtoms({});
                        if (!atoms || atoms.length === 0) {
                            throw new Error("无法获取原子数据");
                        }

                        // 检查是否所有原子都有有效的坐标
                        const invalidAtoms = atoms.filter(atom =>
                            isNaN(atom.x) || isNaN(atom.y) || isNaN(atom.z)
                        );

                        if (invalidAtoms.length > 0) {
                            throw new Error("部分原缺少有效的坐标信息");
                        }

                        // 原子数据中获取键信息
                        const bonds = [];
                        atoms.forEach((atom, i) => {
                            if (atom.bonds && atom.bondOrder) {
                                atom.bonds.forEach((bondedAtomIndex, j) => {
                                    // 只添加一次键（避免重复）
                                    if (bondedAtomIndex > i) {
                                        bonds.push({
                                            atom1: i,
                                            atom2: bondedAtomIndex,
                                            order: atom.bondOrder[j] || 1
                                        });
                                    }
                                });
                            }
                        });

                        // MOL2 文件头部
                        content = "@<TRIPOS>MOLECULE\n";
                        content += "Generated by 3D Molecule Viewer\n";
                        content += `${atoms.length} ${bonds.length} 0 0 0\n`;
                        content += "SMALL\nUSER_CHARGES\n\n";

                        // 原子部分
                        content += "@<TRIPOS>ATOM\n";
                        atoms.forEach((atom, i) => {
                            try {
                                // 使用原始坐标值，不再默认为0
                                if (isNaN(atom.x) || isNaN(atom.y) || isNaN(atom.z)) {
                                    throw new Error(`原子 ${i + 1} (${atom.elem}) 缺少有效坐标`);
                                }

                                const line = [
                                    (i + 1).toString().padStart(7),
                                    `${atom.elem}${i + 1}`.padEnd(8),
                                    atom.x.toFixed(4).padStart(10),
                                    atom.y.toFixed(4).padStart(10),
                                    atom.z.toFixed(4).padStart(10),
                                    getMol2AtomType(atom.elem).padEnd(5),
                                    "1".padStart(5),
                                    "UNK".padEnd(8),
                                    "0.0000".padStart(8)
                                ].join(" ");

                                content += line + "\n";
                            } catch (atomError) {
                                console.error("处理原子数据时出错:", atomError);
                                throw new Error(`处理原子 ${i + 1} 时出错: ${atomError.message}`);
                            }
                        });

                        // 键部分
                        if (bonds.length > 0) {
                            content += "\n@<TRIPOS>BOND\n";
                            bonds.forEach((bond, i) => {
                                try {
                                    content += sprintf("%6d %6d %6d %2d\n",
                                        i + 1,              // 键ID
                                        bond.atom1 + 1,     // 第一个原子的ID
                                        bond.atom2 + 1,     // 第二个原子的ID
                                        parseInt(bond.order) // 键类型（1=单键，2=双键，3=三键）
                                    );
                                } catch (bondError) {
                                    console.error("处理键数据时出错:", bondError);
                                    throw new Error(`处理键 ${i + 1} 时出错`);
                                }
                            });
                        }

                    } catch (error) {
                        Toastify(
                            {
                                text: `MOL2式转换失败: ${error.message}`,
                                style: {
                                    background: '#02ABB9'
                                }
                            }
                        ).showToast();

                        return;
                    }
                    break;
            }

            let blob = new Blob([content], {
                type: "text/plain;charset=utf-8"
            });
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.style.display = "none";
            a.href = url;
            a.download = "molecule." + format;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
        });

        /**
         * 添加通信单元卸载
         */
        window.addEventListener('unload', () => {
            // 移除 resize 事件监听器
            if (window.parent) {
                window.parent.removeEventListener('resize', updateStyles);
            } else {
                window.removeEventListener('resize', updateStyles);
            }

            // 原有的清理代码
            unit.destroyCommunicationClient()
        })

        // 修改样式选择的事件监听器
        const styleSelect = document.getElementById('styleSelect');

        styleSelect.addEventListener('change', function () {
            if (viewer && modelLoaded && previousData) {
                // 使用已有的数据重新渲染分子
                renderMolecule(allData);
            }
        });

        // 在初始化时也调用一次
        ensureCanvasSize();
    });

    //导出PDB文件的字符串辅助函数
    function sprintf(format, ...args) {
        let i = 0;
        return format.replace(/%([0-9]*\.?[0-9]*[sdf])/g, function (match, type) {
            let pad = type.match(/[0-9]+/);
            let decimal = type.match(/\.[0-9]+/);
            let value = args[i++];

            if (type.endsWith('s')) {
                value = String(value);
                return pad ? value.padStart(parseInt(pad[0])) : value;
            }
            if (type.endsWith('d')) {
                value = parseInt(value);
                return pad ? String(value).padStart(parseInt(pad[0])) : value;
            }
            if (type.endsWith('f')) {
                value = parseFloat(value);
                if (decimal) {
                    value = value.toFixed(parseInt(decimal[0].substring(1)));
                }
                return pad ? String(value).padStart(parseInt(pad[0])) : value;
            }
        });
    }
    function getMol2AtomType(element) {
        // MOL2原子类型映射
        const typeMap = {
            'C': 'C.3',   // sp3 carbon
            'N': 'N.3',   // sp3 nitrogen
            'O': 'O.3',   // sp3 oxygen
            'S': 'S.3',   // sp3 sulfur
            'P': 'P.3',   // sp3 phosphorus
            'H': 'H',     // hydrogen
            'F': 'F',     // fluorine
            'Cl': 'Cl',   // chlorine
            'Br': 'Br',   // bromine
            'I': 'I'      // iodine
        };
        return typeMap[element] || element;
    }

    function getBondType(order) {
        // 键类型映射
        const bondMap = {
            1: '1',    // 单键
            2: '2',    // 双键
            3: '3',    // 三键
            1.5: 'ar'  // 芳香键
        };
        return bondMap[order] || '1';
    }
</script>
