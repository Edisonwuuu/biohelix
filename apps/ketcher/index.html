<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <base href="/biohelix/">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Ketcher is a web-based chemical structure editor" />
    <link rel="shortcut icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <title>Ketcher ae7591f</title>
    <link href="/apps/ketcher/static/css/main.css" rel="stylesheet">
    <script>
        const unit = window.parent.unit2d;
    </script>
    <script>

        document.addEventListener('DOMContentLoaded', () => {
            const observer = new MutationObserver(() => {
                unit.sendMessage('editorChanged', '*');
            });

            const config = {
                childList: true,
                subtree: true
            };

            observer.observe(document.body, config);
        });
    </script>
</head>

<body><noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--standalone版本-->
    <script src="/apps/ketcher/static/js/main.js"></script>
    <script>
        // 添加分子的函数
        let layout_timer = null
        let layout_timer_count = 0
        let isLayouting=false;

        async function addMoleculeToKetcher(newMoleculeData) {
            try {
                // 获取当前的分子结构
                await ketcher.setMolecule(newMoleculeData)
                // await ketcher.addFragment(newMoleculeData)
                isLayouting=true;
            } catch (error) {
                console.error('Error adding molecule:', error);
            }

            // try {
            //     if (layout_timer) {
            //         clearTimeout(layout_timer)
            //     }

            //     layout_timer = setTimeout(async () => {
            //         await ketcher.layout()
            //         layout_timer = null
            //         layout_timer_count = 0
            //         isLayouting=false;
            //         if(!isLayouting){
            //             unit.sendMessage('layoutOverForMain','','main-app')
            //         }
            //     }, 1000 + layout_timer_count * 180)
            // } catch (err) {
            //     console.error(err)
            // }
        }

        setTimeout(function () {
            if (typeof ketcher === 'undefined') {
                return;
            }
            const buttonsToHide = [
                '3D Viewer',
                'About',
                'Help (?)',
            ];

            buttonsToHide.forEach(title => {
                const button = document.querySelector(`.Ketcher-root button[title="${title}"]`);
                if (button) button.style.display = 'none';
            });
            // 获取buttonContainer元素，这里假设你已经有了这个元素
            const buttonContainer = document.querySelector('.css-g3mmh9');

            // 创建一个新的button元素
            const button = document.createElement('button');
            button.className = 'css-9c2fhu'; // 设置类名
            button.setAttribute('title', '保存当前分子'); // 设置标题
            button.setAttribute('data-testid', 'fullscreen-mode-button'); // 设置测试ID
            button.setAttribute('id','mole-attribute')
            // const moleAttribute=document.querySelector('#mole-attribute')
            const img = document.createElement('img');
            img.src = '../../images/save.png'; // 设置SVG文件的路径
            img.alt = '保存图标'; // 设置替代文本
            img.width = '20'; // 设置宽度
            img.height = '20'; // 设置高度

            // 将img元素添加到button元素中
            button.appendChild(img);

            // 将button元素添加到buttonContainer中
            const existingButton = buttonContainer.querySelector('button') || buttonContainer.firstChild;

            // 将新button插入到已有按钮之前
            if (existingButton) {
                buttonContainer.insertBefore(button, existingButton);
            } else {
                // 如果没有找到任何按钮，就直接appendChild
                buttonContainer.appendChild(button);
            }

            button.addEventListener('click', function (event) {
                // 在这里编写你的点击事件处理代
                unit.sendMessage('show-name-modal', '', 'main-app')
            });
            //  通信单元
            unit.registerApp('2d');
            //  接收消息后的回调函数
            const handleIncomingMessage = (data) => {
                const {
                    type
                } = data
                if (type === 'UNIT_MESSAGE') {
                    const {
                        msgDetailType
                    } = data
                    switch (msgDetailType) {
                        case 'updateData':
                            ketcher.addFragment(data.data)
                            break;

                        default:
                            break;
                    }
                }
            }
            unit.on(handleIncomingMessage)
            let sendMes = ''
            // 判断是否为 SDF 格式的数据
            function isSdfFormat(data) {
                return typeof data === 'string' &&
                    (data.includes('V2000') || data.includes('M  END'));
            }
            // 修改分子的函数
            async function modifyMoleculeInKetcher(modifiedMoleculeData) {
                try {
                    if (isSdfFormat(modifiedMoleculeData)) {
                        // 如果是 SDF 格式，直接使用 setMolecule
                        await ketcher.addFragment(modifiedMoleculeData);
                    } else {
                        // 其他格式使用原来的方式
                        await ketcher.addFragment('`' + modifiedMoleculeData + '`');
                    }
                    unit.sendMessage('remindResult', '分子结构已成功修改', 'unitMain');
                } catch (error) {
                    unit.sendMessage('remindResult', '修改分子结构失败', 'unitMain');
                }
            }

            unit.on('render2D', (data) => {
                try {
                    addMoleculeToKetcher(data.data);
                } catch (error) {
                    console.error('Failed to render AI response:', error);
                }
                sendMes = data.data;
            });

            unit.on('startAIFor2d',()=>{
                unit.sendMessage('startAIForMain','','main-app')
            })

            let lastSentSdf = null;

            ketcher.editor.subscribe('change', async () => {
                let mol = await ketcher.getSdf();
                let smiles = await ketcher.getSmiles();
                let reg = /(?:^|\n)\s*-INDIGO-[\s\S]*?M\s+END\s*(?:\$\$\$\$\n)?/g;
                let res = mol.match(reg) || [];
                // 发送当前的 SDF 数据到 3D 渲模块
                // unit.sendMessage('render-3d', res, '3d');
                // unit.sendMessage('sdfChanged', res, 'main-app');
                unit.sendMessage('sdfChanged', res, '3d');
                unit.sendMessage('toAI', res, 'main-app');
                unit.sendMessage('moleData', smiles, 'main-app');
                // if (res.length !== 0) {
                //     const trimmedSendMes = sendMes.split('\n').slice(2).join('\n');
                //     let trimmedRes = res.join('\n').split('\n').slice(2); // 保留数组格式
                //     trimmedRes.pop(); // 删除最后一行
                //     trimmedRes = trimmedRes.join('\n'); // 重新拼接成字符串
                //     trimmedRes = trimmedRes.trimEnd();
                //     if (trimmedRes.endsWith('$$$$')) {
                //         trimmedRes = trimmedRes.slice(0, -4); // 删除最后的 '$$$$'
                //     }

                //     if (trimmedSendMes !== trimmedRes) {
                //         unit.sendMessage('toAI', res, 'main-app');
                //         lastSentSdf = res; // 更新 lastSentSdf
                //     }
                // }
            });
        }, 300);

    </script>
</body>

</html>
